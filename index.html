<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星際奇幻抽籤 - 3D 旋轉星空</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Inter & Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Three.js (3D Starfield Background) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #03001e;
            overflow-x: hidden;
        }
        
        /* 玻璃擬態 (Glassmorphism) 效果 */
        .glass-panel {
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
        }

        /* 漸層文字與炫光 */
        .neon-text {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .neon-gold {
            background: linear-gradient(135deg, #ffe066 0%, #f5af19 50%, #e65c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(245, 175, 25, 0.4);
        }

        /* 自訂捲軸 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 242, 254, 0.6);
        }

        /* 音波脈衝動畫 */
        @keyframes pulse-glow {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            }
            50% {
                transform: scale(1.03);
                box-shadow: 0 0 35px rgba(0, 242, 254, 0.6), 0 0 50px rgba(79, 172, 254, 0.4);
            }
        }
        
        .glow-button:not(:disabled) {
            animation: pulse-glow 2s infinite;
        }

        /* 旋轉動畫 */
        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .orbit-spin {
            animation: orbit 15s linear infinite;
        }

        /* 抽籤時的炫光框 */
        .winner-border {
            position: relative;
            border-radius: 1rem;
            overflow: hidden;
        }
        .winner-border::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 30%, #00f2fe, #ff007f, transparent 70%);
            animation: rotate-conic 2s linear infinite;
        }
        .winner-inner {
            position: relative;
            background: #060914;
            margin: 3px;
            border-radius: calc(1rem - 3px);
        }
        @keyframes rotate-conic {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="h-full select-none text-white relative">

    <div class="fixed inset-0 z-0 pointer-events-auto" id="canvas-container"></div>

    <!-- UI 主容器 -->
    <div class="relative z-10 flex flex-col min-h-screen justify-between p-4 md:p-8">
        
        <header class="w-full max-w-6xl mx-auto flex justify-between items-center py-2 mb-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gradient-to-tr from-cyan-500 to-fuchsia-500 shadow-lg shadow-cyan-500/20">
                    <i class="fas fa-meteor text-lg text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-400">星際奇幻抽籤</h1>
                    <p class="text-xs text-cyan-300/60 font-mono">STARLIT LOTTERY v2.0</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3">
                <!-- 靜音切換 -->
                <button id="toggle-sound-btn" class="w-10 h-10 rounded-xl glass-card flex items-center justify-center hover:bg-white/10 transition-all text-cyan-300" title="切換音效">
                    <i class="fas fa-volume-up" id="sound-icon"></i>
                </button>
                <!-- 設定按鈕 -->
                <button id="open-settings-btn" class="px-4 py-2 rounded-xl bg-gradient-to-r from-cyan-500/20 to-fuchsia-500/20 hover:from-cyan-500/40 hover:to-fuchsia-500/40 border border-cyan-500/30 hover:border-cyan-400/60 text-cyan-200 transition-all duration-300 flex items-center space-x-2 shadow-lg shadow-cyan-950/40">
                    <i class="fas fa-sliders-h"></i>
                    <span class="text-sm font-semibold">設定名單</span>
                </button>
            </div>
        </header>

        <main class="w-full max-w-4xl mx-auto flex-grow flex flex-col justify-center my-4">
            
            <!-- 大轉輪 / 抽籤顯示核心卡片 -->
            <div class="glass-panel w-full rounded-2xl md:rounded-3xl p-6 md:p-12 text-center relative overflow-hidden mb-6 flex flex-col items-center justify-between min-h-[400px] md:min-h-[480px]">
                
                <!-- 星雲動態光暈效果 -->
                <div class="absolute -top-40 -left-40 w-96 h-96 bg-fuchsia-600/10 rounded-full filter blur-3xl pointer-events-none"></div>
                <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-cyan-600/10 rounded-full filter blur-3xl pointer-events-none"></div>
                
                <!-- 剩餘人數提示 -->
                <div class="inline-flex items-center space-x-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs font-mono text-cyan-300 tracking-wider">
                    <span class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></span>
                    <span>池內名單數: <strong id="pool-count">0</strong> 人</span>
                </div>

                <!-- 抽籤中央顯示器 -->
                <div class="my-auto py-8 w-full flex flex-col items-center justify-center">
                    
                    <!-- 未抽籤狀態 / 待命狀態 -->
                    <div id="draw-placeholder" class="space-y-4">
                        <!-- 旋轉星軌裝飾 -->
                        <div class="relative w-36 h-36 mx-auto flex items-center justify-center">
                            <div class="absolute inset-0 border-2 border-dashed border-cyan-500/30 rounded-full orbit-spin"></div>
                            <div class="absolute inset-4 border border-fuchsia-500/20 rounded-full"></div>
                            <i class="fas fa-astronaut text-4xl text-cyan-200/80 animate-bounce"></i>
                        </div>
                        <p id="system-status-msg" class="text-lg text-slate-300/80 font-medium tracking-wide">準備就緒，點擊下方「開始啟航」進行抽取</p>
                    </div>

                    <!-- 正在滾動狀態 -->
                    <div id="draw-rolling" class="hidden space-y-6 w-full">
                        <div class="text-xs uppercase tracking-widest text-fuchsia-400 font-bold animate-pulse">正在穿梭星際軌道...</div>
                        <div class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-white to-fuchsia-300 tracking-wider py-4 max-w-full truncate px-4" id="rolling-name">
                            - - -
                        </div>
                        <div class="flex justify-center space-x-2">
                            <div class="w-2 h-2 rounded-full bg-cyan-400 animate-bounce" style="animation-delay: 0.1s"></div>
                            <div class="w-2 h-2 rounded-full bg-fuchsia-400 animate-bounce" style="animation-delay: 0.2s"></div>
                            <div class="w-2 h-2 rounded-full bg-cyan-400 animate-bounce" style="animation-delay: 0.3s"></div>
                        </div>
                    </div>

                    <!-- 抽出結果狀態 -->
                    <div id="draw-result" class="hidden space-y-6 w-full">
                        <div class="text-xs uppercase tracking-widest text-amber-400 font-bold flex items-center justify-center space-x-2">
                            <i class="fas fa-star animate-pulse"></i>
                            <span>幸運中獎星辰</span>
                            <i class="fas fa-star animate-pulse"></i>
                        </div>
                        
                        <!-- 單人中獎或多人中獎分流 -->
                        <div id="single-winner-box" class="hidden max-w-md mx-auto winner-border shadow-2xl shadow-cyan-500/20">
                            <div class="winner-inner px-8 py-8 md:py-12">
                                <div class="text-4xl md:text-6xl font-extrabold neon-gold truncate" id="winner-name">
                                    - - -
                                </div>
                            </div>
                        </div>

                        <div id="multi-winner-box" class="hidden w-full max-w-2xl mx-auto">
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 md:gap-4 max-h-[220px] overflow-y-auto px-2" id="multi-winners-grid">
                                <!-- 動態渲染多人卡片 -->
                            </div>
                        </div>

                    </div>

                </div>

                <!-- 動作按鈕 -->
                <div class="w-full flex flex-col sm:flex-row justify-center items-center gap-4">
                    <button id="draw-btn" class="glow-button w-full sm:w-64 px-8 py-4 rounded-xl bg-gradient-to-r from-cyan-500 to-fuchsia-600 hover:from-cyan-400 hover:to-fuchsia-500 text-white text-lg font-bold tracking-widest transition-all duration-300 shadow-lg shadow-cyan-500/20 disabled:opacity-50 disabled:pointer-events-none transform hover:-translate-y-0.5 active:translate-y-0">
                        <i class="fas fa-rocket mr-2"></i>開始抽籤
                    </button>
                    
                    <button id="reset-btn" class="w-full sm:w-auto px-6 py-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/20 text-slate-300 hover:text-white font-medium transition-all duration-200 text-sm">
                        <i class="fas fa-redo-alt mr-2"></i>重設抽籤
                    </button>
                </div>

            </div>

            <div class="glass-panel w-full rounded-2xl p-6">
                <div class="flex justify-between items-center border-b border-white/10 pb-3 mb-4">
                    <h3 class="text-sm font-semibold tracking-wider text-cyan-300 uppercase flex items-center space-x-2">
                        <i class="fas fa-history text-xs"></i>
                        <span>得獎星雲榜 (歷史紀錄)</span>
                    </h3>
                    <div class="flex items-center space-x-2">
                        <button id="export-history-btn" class="text-xs px-2.5 py-1.5 rounded bg-white/5 border border-white/10 hover:bg-white/10 transition-all text-slate-300" title="複製名單到剪貼簿">
                            <i class="fas fa-copy mr-1"></i>複製
                        </button>
                        <button id="clear-history-btn" class="text-xs px-2.5 py-1.5 rounded bg-red-500/10 border border-red-500/20 hover:bg-red-500/20 transition-all text-red-400">
                            <i class="fas fa-trash-alt mr-1"></i>清除
                        </button>
                    </div>
                </div>
                
                <div class="max-h-[120px] overflow-y-auto" id="history-container">
                    <div id="history-empty" class="text-center py-6 text-sm text-slate-400/50 italic">
                        尚無得獎紀錄
                    </div>
                    <ul id="history-list" class="hidden divide-y divide-white/5 space-y-1">
                        <!-- 動態插入 -->
                    </ul>
                </div>
            </div>

        </main>

        <footer class="w-full text-center py-4 text-xs text-slate-400/40 font-mono tracking-wider">
            STARLIT LOTTERY © 2026 CO-DESIGNED WITH COSMIC BEAUTY
        </footer>

    </div>

    <div id="settings-modal" class="fixed inset-0 z-50 flex justify-end bg-black/60 backdrop-blur-sm pointer-events-none opacity-0 transition-opacity duration-300">
        <div id="settings-panel" class="w-full max-w-md h-full bg-[#050814] border-l border-white/10 p-6 flex flex-col justify-between transform translate-x-full transition-transform duration-300 ease-out pointer-events-auto shadow-2xl">
            
            <div class="space-y-6 overflow-y-auto flex-grow pr-1">
                <!-- 標題 -->
                <div class="flex justify-between items-center border-b border-white/10 pb-4">
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-user-astronaut text-cyan-400 text-lg"></i>
                        <h2 class="text-lg font-bold tracking-wider text-cyan-100">抽籤設定面板</h2>
                    </div>
                    <button id="close-settings-btn" class="text-slate-400 hover:text-white transition-colors">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <!-- 快捷預設 -->
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-cyan-300 uppercase tracking-widest block">快捷名單載入</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button type="button" onclick="loadPreset('numbers')" class="text-xs py-2 px-1 rounded bg-white/5 border border-white/10 hover:border-cyan-500/50 text-slate-300 hover:text-cyan-300 transition-all text-center">
                            幸運數字 (1-50)
                        </button>
                        <button type="button" onclick="loadPreset('dinner')" class="text-xs py-2 px-1 rounded bg-white/5 border border-white/10 hover:border-cyan-500/50 text-slate-300 hover:text-cyan-300 transition-all text-center">
                            今天吃什麼
                        </button>
                        <button type="button" onclick="loadPreset('employees')" class="text-xs py-2 px-1 rounded bg-white/5 border border-white/10 hover:border-cyan-500/50 text-slate-300 hover:text-cyan-300 transition-all text-center">
                            公司尾牙名單
                        </button>
                    </div>
                </div>

                <!-- 名單輸入區 -->
                <div class="space-y-2">
                    <div class="flex justify-between items-baseline">
                        <label for="names-input" class="text-xs font-semibold text-cyan-300 uppercase tracking-widest">候選名單列表</label>
                        <span class="text-[10px] text-slate-400">支援換行、逗號或空白分隔</span>
                    </div>
                    <textarea id="names-input" class="w-full h-64 px-4 py-3 bg-slate-950 border border-white/10 rounded-xl focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 text-sm font-sans text-slate-100 placeholder-slate-600 outline-none transition-all resize-none" placeholder="請在此輸入抽籤名單，例如：&#10;阿姆斯壯&#10;加加林&#10;尤里&#10;太空兔..."></textarea>
                </div>

                <!-- 抽籤規則設定 -->
                <div class="space-y-4 pt-2">
                    <label class="text-xs font-semibold text-cyan-300 uppercase tracking-widest block border-b border-white/5 pb-2">規則細節</label>
                    
                    <!-- 一次抽出幾人 -->
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-sm font-medium text-slate-200 block">一次抽取人數</span>
                            <span class="text-[10px] text-slate-500">同時產出多個名單</span>
                        </div>
                        <div class="flex items-center space-x-1">
                            <button id="qty-minus" class="w-8 h-8 rounded bg-white/5 border border-white/10 text-slate-300 flex items-center justify-center hover:bg-white/10">-</button>
                            <input type="number" id="draw-quantity" value="1" min="1" max="100" class="w-12 h-8 text-center bg-slate-950 border border-white/10 rounded text-sm text-cyan-300 outline-none">
                            <button id="qty-plus" class="w-8 h-8 rounded bg-white/5 border border-white/10 text-slate-300 flex items-center justify-center hover:bg-white/10">+</button>
                        </div>
                    </div>

                    <!-- 移除已抽中者 (重複抽取) -->
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-sm font-medium text-slate-200 block">允許重複中獎</span>
                            <span class="text-[10px] text-slate-500">抽出名單後，不將其從池中移出</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="allow-duplicates" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-300 after:border-gray-300 after:border after:rounded-full after:height-5 after:width-5 after:transition-all peer-checked:bg-cyan-500 peer-checked:after:bg-white"></div>
                        </label>
                    </div>
                </div>

            </div>

            <!-- 確認儲存按鈕 -->
            <div class="pt-6 border-t border-white/10">
                <button id="save-settings-btn" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-cyan-500 to-fuchsia-600 hover:from-cyan-400 hover:to-fuchsia-500 text-white font-bold tracking-widest transition-all shadow-lg shadow-cyan-950/50">
                    <i class="fas fa-check mr-2"></i>套用並儲存設定
                </button>
            </div>

        </div>
    </div>

    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col space-y-2 max-w-sm pointer-events-none"></div>

    <script>
        let scene, camera, renderer, starGeometry, stars, nebulae = [];
        let mouseX = 0, mouseY = 0;
        const container = document.getElementById('canvas-container');

        function initThree() {
            // 建立場景
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x03001e, 0.001);

            // 建立相機
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 250;

            // 建立渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 建立旋轉星塵 (Galaxy Point Cloud)
            starGeometry = new THREE.BufferGeometry();
            const starsCount = 4000;
            const positions = new Float32Array(starsCount * 3);
            const colors = new Float32Array(starsCount * 3);

            // 建立螺旋星系結構
            for(let i=0; i<starsCount; i++) {
                // 星系螺旋臂形狀
                const r = Math.random() * 200 + 10;
                const arms = 3;
                const armAngle = (i % arms) * ((2 * Math.PI) / arms);
                const angle = armAngle + r * 0.03 + (Math.random() - 0.5) * 0.4;

                const x = Math.cos(angle) * r;
                const y = (Math.random() - 0.5) * 15;
                const z = Math.sin(angle) * r;

                positions[i*3] = x;
                positions[i*3+1] = y;
                positions[i*3+2] = z;

                // 隨機星光色系 (藍白、紫紅、純白)
                const randColor = Math.random();
                if (randColor > 0.6) {
                    // 夢幻藍色星光
                    colors[i*3] = 0.5;
                    colors[i*3+1] = 0.8;
                    colors[i*3+2] = 1.0;
                } else if (randColor > 0.3) {
                    // 夢幻紫紅色星光
                    colors[i*3] = 0.9;
                    colors[i*3+1] = 0.4;
                    colors[i*3+2] = 1.0;
                } else {
                    // 純亮白星光
                    colors[i*3] = 1.0;
                    colors[i*3+1] = 1.0;
                    colors[i*3+2] = 1.0;
                }
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // 使用 Canvas 繪製柔和圓形粒子
            const starTexture = createCircularParticleTexture();

            const starMaterial = new THREE.PointsMaterial({
                size: 1.8,
                map: starTexture,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            // 建立幾個發光星雲星團 (Nebula Bulbs)
            for (let i = 0; i < 5; i++) {
                const nebGeom = new THREE.SphereGeometry(Math.random() * 20 + 20, 16, 16);
                const nebMat = new THREE.MeshBasicMaterial({
                    color: i % 2 === 0 ? 0x00f2fe : 0xff007f,
                    transparent: true,
                    opacity: 0.03,
                    blending: THREE.AdditiveBlending,
                    wireframe: true
                });
                const nebMesh = new THREE.Mesh(nebGeom, nebMat);
                nebMesh.position.set(
                    (Math.random() - 0.5) * 200,
                    (Math.random() - 0.5) * 50,
                    (Math.random() - 0.5) * 200
                );
                scene.add(nebMesh);
                nebulae.push(nebMesh);
            }

            // 互動性滑鼠感應
            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - window.innerWidth / 2) * 0.05;
                mouseY = (e.clientY - window.innerHeight / 2) * 0.05;
            });

            // 響應式調整視窗大小
            window.addEventListener('resize', onWindowResize);

            // 啟動動畫循環
            animate();
        }

        // 生成發光粒子 Texture 避免加載外部資源
        function createCircularParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 自動緩慢自轉星系
            stars.rotation.y += 0.0008;
            stars.rotation.x = Math.sin(Date.now() * 0.0001) * 0.1;

            // 微調星雲形變與位置
            nebulae.forEach((neb, idx) => {
                neb.rotation.x += 0.002 * (idx + 1);
                neb.rotation.y += 0.001 * (idx + 1);
            });

            // 滑鼠交互視差效果
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        // 啟動 3D 星雲
        window.onload = function() {
            initThree();
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true;

        // 啟動或恢復瀏覽器的 AudioContext (避免因瀏覽器安全政策而靜音)
        function resumeAudioContext() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 播放快速滾動滴答聲 (用於抽籤旋轉動畫中)
        function playTickSound() {
            if (!soundEnabled) return;
            resumeAudioContext();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600 + Math.random() * 400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            } catch (e) {
                console.log("音效未啟用，等待使用者互動");
            }
        }

        // 播放震撼中獎慶祝音效 (帶有太空科技感與向上滑音)
        function playFanfareSound() {
            if (!soundEnabled) return;
            resumeAudioContext();
            try {
                const now = audioCtx.currentTime;
                
                // 1. 太空風嘯聲與上升音效 (Sweeper) - 營造粒子大爆炸與升空的壯觀感
                const sweepOsc = audioCtx.createOscillator();
                const sweepGain = audioCtx.createGain();
                sweepOsc.connect(sweepGain);
                sweepGain.connect(audioCtx.destination);
                
                sweepOsc.type = 'sawtooth';
                sweepOsc.frequency.setValueAtTime(150, now);
                sweepOsc.frequency.exponentialRampToValueAtTime(800, now + 1.0);
                
                sweepGain.gain.setValueAtTime(0, now);
                sweepGain.gain.linearRampToValueAtTime(0.06, now + 0.2);
                sweepGain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                
                sweepOsc.start(now);
                sweepOsc.stop(now + 1.0);

                // 2. 璀璨星空鐘琴和弦 (大九和弦琶音) - 帶來神聖、喜慶的氛圍
                const chords = [261.63, 329.63, 392.00, 493.88, 587.33, 783.99]; // Cmaj9 和弦組合
                chords.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    // 加入微弱的濾波器以增加空靈悠遠的星際迴音感
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'peaking';
                    filter.Q.value = 5;
                    filter.frequency.value = freq * 2;
                    
                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.type = 'sine';
                    const delay = i * 0.08; // 琶音延遲，一個接一個響起
                    osc.frequency.setValueAtTime(freq, now + delay);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.12, now + delay + 0.03);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 2.5); // 延長悠長的餘音
                    
                    osc.start(now + delay);
                    osc.stop(now + delay + 2.5);
                });
            } catch (e) {
                console.log(e);
            }
        }

        // 播放按鈕點擊微弱震動音
        function playClickSound() {
            if (!soundEnabled) return;
            resumeAudioContext();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(350, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }

        // 語音播報中獎者名稱 (TTS)
        function speakWinners(winners) {
            if (!soundEnabled || !('speechSynthesis' in window)) return;
            
            // 停止先前可能還在播放的任何語音，避免重疊或延遲
            window.speechSynthesis.cancel();
            
            let text = "";
            if (winners.length === 1) {
                text = `恭喜 ${winners[0]} 中獎！`;
            } else {
                text = `恭喜中獎者： ${winners.join('、')} ！`;
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.95; // 稍慢的速度，讓名稱朗讀更加字正腔圓
            utterance.pitch = 1.05; // 稍微帶點喜慶高亢的語調
            
            // 嘗試載入最適合的本地中文（台灣）語音
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.includes('zh-TW') || v.lang.includes('zh-HK') || v.lang.includes('zh-CN'));
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }
            
            // 延遲 300 毫秒，等中獎慶祝樂的初始爆發聲稍過後再朗讀，聽得最清楚
            setTimeout(() => {
                window.speechSynthesis.speak(utterance);
            }, 300);
        }
        
        // 預設抽籤名單
        const presets = {
            numbers: Array.from({length: 50}, (_, i) => `幸運數字 ${i+1}`).join('\n'),
            dinner: ["拉麵", "牛肉麵", "小籠包", "滷肉飯", "麥當勞", "精緻火鍋", "義大利麵", "日式壽司", "地中海溫沙拉", "韓式炸雞", "泰式咖哩", "居酒屋串燒", "健康便當", "麻辣鴨血", "鐵板燒"].join('\n'),
            employees: ["黃大明", "張小華", "李美玲", "趙鐵柱", "王小寶", "陳阿美", "劉德華", "周杰倫", "蔡依林", "林俊傑", "金城武", "彭于晏", "桂綸鎂", "舒淇", "梁朝偉", "周星馳", "張曼玉", "林青霞", "伍佰", "青峰"].join('\n')
        };

        // 應用程式狀態
        let lotteryPool = [];      // 目前在池子裡的人 (未被移出)
        let originalList = [];     // 初始匯入的全部名單 (供重設用)
        let currentDrawCount = 1;  // 一次抽幾個
        let allowDuplicates = false;// 是否重複中獎
        let history = [];          // 得獎歷史紀錄
        let isDrawing = false;     // 是否正在抽籤
        let drawInterval;          // 滾動計時器

        // 初始化預設值
        document.getElementById('names-input').value = presets.employees;
        parseInputNames();

        // 解析文字輸入欄位並更新池中人數
        function parseInputNames() {
            const rawText = document.getElementById('names-input').value;
            // 允許以 換行、逗號 或 多個空白 作為分隔符號
            const parsed = rawText
                .split(/[\n,，\s+]+/)
                .map(n => n.trim())
                .filter(n => n.length > 0);

            lotteryPool = [...parsed];
            originalList = [...parsed];
            updatePoolCountUI();
        }

        // 更新介面上的剩餘總人數
        function updatePoolCountUI() {
            document.getElementById('pool-count').textContent = lotteryPool.length;
        }

        // 快捷載入模板
        function loadPreset(key) {
            playClickSound();
            if (presets[key]) {
                document.getElementById('names-input').value = presets[key];
                parseInputNames();
                showToast(`已載入預設名單: ${getPresetName(key)}`, "info");
            }
        }

        function getPresetName(key) {
            if (key === 'numbers') return '幸運數字';
            if (key === 'dinner') return '今天吃什麼';
            if (key === 'employees') return '公司尾牙';
            return '';
        }



        // 執行抽籤
        function triggerLottery() {
            if (isDrawing) return;
            playClickSound();

            if (lotteryPool.length === 0) {
                showToast("當前名單池已空！請重設名單或到「設定」加入新成員。", "warning");
                return;
            }

            currentDrawCount = parseInt(document.getElementById('draw-quantity').value) || 1;
            allowDuplicates = document.getElementById('allow-duplicates').checked;

            if (currentDrawCount > lotteryPool.length && !allowDuplicates) {
                showToast(`人數不足！剩餘 ${lotteryPool.length} 人，卻嘗試抽取 ${currentDrawCount} 人。已為您將抽取人數調整為 ${lotteryPool.length} 人。`, "warning");
                currentDrawCount = lotteryPool.length;
                document.getElementById('draw-quantity').value = currentDrawCount;
            }

            // 開始星際穿梭動畫
            isDrawing = true;
            toggleButtonsState(true);
            
            // UI 切換至滾動狀態
            document.getElementById('draw-placeholder').classList.add('hidden');
            document.getElementById('draw-result').classList.add('hidden');
            document.getElementById('draw-rolling').classList.remove('hidden');

            const rollingNameEl = document.getElementById('rolling-name');
            let duration = 2000; // 滾動持續時間 (毫秒)
            let speed = 40;     // 初始變動速度 (毫秒/次)
            let startTime = Date.now();

            // 隨機在現存池中快速切換名字顯示
            function roll() {
                const randomName = lotteryPool[Math.floor(Math.random() * lotteryPool.length)];
                rollingNameEl.textContent = randomName;
                playTickSound();

                const elapsed = Date.now() - startTime;
                if (elapsed < duration) {
                    // 隨著時間，逐漸減慢轉速
                    speed = 40 + (elapsed / duration) * 200;
                    drawInterval = setTimeout(roll, speed);
                } else {
                    // 時間到，進行最終結算
                    finalizeLottery();
                }
            }

            roll();
        }

        // 最終結算中獎者
        function finalizeLottery() {
            clearTimeout(drawInterval);
            isDrawing = false;

            const winners = [];
            const timestamp = new Date().toLocaleTimeString();

            // 進行隨機抽籤
            for (let i = 0; i < currentDrawCount; i++) {
                if (lotteryPool.length === 0) break;
                
                const randomIndex = Math.floor(Math.random() * lotteryPool.length);
                const winner = lotteryPool[randomIndex];
                winners.push(winner);

                // 如果設定中不允許重複中獎，則將其從現有池中移除
                if (!allowDuplicates) {
                    lotteryPool.splice(randomIndex, 1);
                }
            }

            // 將中獎者紀錄到歷史中
            history.unshift({
                time: timestamp,
                winners: [...winners]
            });

            // 播放慶祝聲音、播報中獎語音與更新 UI
            playFanfareSound();
            speakWinners(winners);
            displayWinnersUI(winners);
            updateHistoryUI();
            updatePoolCountUI();
            toggleButtonsState(false);

            // 觸發星際粒子大爆炸 (3D 背景爆破效果)
            burstSpaceParticles();
        }

        // 渲染得獎名單至主面板
        function displayWinnersUI(winners) {
            document.getElementById('draw-rolling').classList.add('hidden');
            document.getElementById('draw-result').classList.remove('hidden');

            const singleBox = document.getElementById('single-winner-box');
            const multiBox = document.getElementById('multi-winner-box');

            if (winners.length === 1) {
                // 單人中獎樣式
                singleBox.classList.remove('hidden');
                multiBox.classList.add('hidden');
                document.getElementById('winner-name').textContent = winners[0];
            } else {
                // 多人中獎樣式
                singleBox.classList.add('hidden');
                multiBox.classList.remove('hidden');
                const grid = document.getElementById('multi-winners-grid');
                grid.innerHTML = '';

                winners.forEach((w, index) => {
                    const card = document.createElement('div');
                    card.className = "px-4 py-3 bg-gradient-to-br from-cyan-900/40 to-fuchsia-950/40 border border-cyan-500/20 rounded-xl flex items-center justify-between shadow-md";
                    card.innerHTML = `
                        <div class="flex items-center space-x-2 truncate">
                            <span class="text-[10px] bg-cyan-500 text-black font-extrabold w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0">${index + 1}</span>
                            <span class="font-bold text-sm text-cyan-200 truncate">${w}</span>
                        </div>
                        <i class="fas fa-crown text-amber-400 text-xs flex-shrink-0 ml-1"></i>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // 觸發星系粒子爆炸反應 (ThreeJS 臨時物理)
        function burstSpaceParticles() {
            // 臨時重設星系運動速度模擬爆裂
            const originalYRot = stars.rotation.y;
            stars.rotation.y += 1.5; // 動態偏移
            
            // 慢慢恢復正常旋轉速度
            let steps = 0;
            const timer = setInterval(() => {
                stars.rotation.y -= (1.5 / 30);
                steps++;
                if (steps >= 30) clearInterval(timer);
            }, 30);
        }

        // 更新歷史紀錄區域
        function updateHistoryUI() {
            const container = document.getElementById('history-container');
            const listEl = document.getElementById('history-list');
            const emptyEl = document.getElementById('history-empty');

            if (history.length === 0) {
                listEl.classList.add('hidden');
                emptyEl.classList.remove('hidden');
                return;
            }

            listEl.classList.remove('hidden');
            emptyEl.classList.add('hidden');
            listEl.innerHTML = '';

            history.forEach((record, hIdx) => {
                const li = document.createElement('li');
                li.className = "py-2.5 flex flex-col sm:flex-row justify-between items-start sm:items-center text-xs space-y-1 sm:space-y-0";
                
                const winnersBadges = record.winners.map(w => `<span class="bg-cyan-500/10 border border-cyan-500/30 text-cyan-300 font-bold px-2 py-0.5 rounded mr-1 inline-block">${w}</span>`).join('');

                li.innerHTML = `
                    <div class="flex items-center space-x-2 flex-wrap">
                        <span class="text-slate-500 font-mono">[${record.time}]</span>
                        <div class="inline-flex items-center flex-wrap">${winnersBadges}</div>
                    </div>
                    <span class="text-slate-400/70 text-[10px]">第 ${history.length - hIdx} 回合</span>
                `;
                listEl.appendChild(li);
            });
        }

        // 重置抽籤
        function resetLottery() {
            playClickSound();
            if (isDrawing) return;

            lotteryPool = [...originalList];
            updatePoolCountUI();

            // 還原 UI 到待命
            document.getElementById('draw-placeholder').classList.remove('hidden');
            document.getElementById('draw-result').classList.add('hidden');
            document.getElementById('draw-rolling').classList.add('hidden');
            document.getElementById('system-status-msg').textContent = "名單已重新洗牌！等待您的幸運啟航";
            
            showToast("抽籤池已被重設回初始設定！", "success");
        }

        // 限制抽籤過程中的按鈕操作
        function toggleButtonsState(disable) {
            document.getElementById('draw-btn').disabled = disable;
            document.getElementById('reset-btn').disabled = disable;
            document.getElementById('open-settings-btn').disabled = disable;
            if (disable) {
                document.getElementById('open-settings-btn').classList.add('opacity-40');
            } else {
                document.getElementById('open-settings-btn').classList.remove('opacity-40');
            }
        }



        // 設定面板 DOM
        const settingsModal = document.getElementById('settings-modal');
        const settingsPanel = document.getElementById('settings-panel');
        const openSettingsBtn = document.getElementById('open-settings-btn');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const drawQuantityInput = document.getElementById('draw-quantity');

        // 開啟設定
        openSettingsBtn.addEventListener('click', () => {
            playClickSound();
            settingsModal.classList.remove('pointer-events-none');
            settingsModal.classList.add('opacity-100');
            settingsPanel.classList.remove('translate-x-full');
        });

        // 關閉設定 (不儲存)
        function closeSettings() {
            playClickSound();
            settingsModal.classList.add('pointer-events-none');
            settingsModal.classList.remove('opacity-100');
            settingsPanel.classList.add('translate-x-full');
        }
        closeSettingsBtn.addEventListener('click', closeSettings);

        // 點擊背景空白處也能關閉設定
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeSettings();
        });

        // 儲存設定並關閉
        saveSettingsBtn.addEventListener('click', () => {
            playClickSound();
            parseInputNames();
            closeSettings();
            showToast(`名單儲存成功！池中共 ${lotteryPool.length} 人。`, "success");

            // 回到起始待命 UI
            document.getElementById('draw-placeholder').classList.remove('hidden');
            document.getElementById('draw-result').classList.add('hidden');
            document.getElementById('draw-rolling').classList.add('hidden');
            document.getElementById('system-status-msg').textContent = "名單已更新！隨時可以開始抽籤";
        });

        // 數量加減器
        document.getElementById('qty-minus').addEventListener('click', () => {
            playClickSound();
            let val = parseInt(drawQuantityInput.value) || 1;
            if (val > 1) drawQuantityInput.value = val - 1;
        });

        document.getElementById('qty-plus').addEventListener('click', () => {
            playClickSound();
            let val = parseInt(drawQuantityInput.value) || 1;
            drawQuantityInput.value = val + 1;
        });

        // 綁定主抽籤按鈕
        document.getElementById('draw-btn').addEventListener('click', triggerLottery);
        // 綁定重設按鈕
        document.getElementById('reset-btn').addEventListener('click', resetLottery);

        // 清空歷史紀錄
        document.getElementById('clear-history-btn').addEventListener('click', () => {
            playClickSound();
            history = [];
            updateHistoryUI();
            showToast("歷史紀錄已完全清除", "info");
        });

        // 匯出複製歷史紀錄
        document.getElementById('export-history-btn').addEventListener('click', () => {
            playClickSound();
            if (history.length === 0) {
                showToast("當前無得獎歷史紀錄可複製", "warning");
                return;
            }

            let textToCopy = "=== 星際奇幻抽籤 中獎星雲榜 ===\n";
            history.forEach((record, i) => {
                textToCopy += `[${record.time}] - 第 ${history.length - i} 回合: ${record.winners.join(', ')}\n`;
            });

            // 使用 document.execCommand 作為 iframe 環境中的安全兼容 fallback
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = textToCopy;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);

            showToast("已成功將中獎名單複製到剪貼簿！", "success");
        });

        // 音量開關
        document.getElementById('toggle-sound-btn').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            const icon = document.getElementById('sound-icon');
            if (soundEnabled) {
                icon.className = "fas fa-volume-up";
                showToast("音效功能已開啟", "info");
                playClickSound();
            } else {
                icon.className = "fas fa-volume-mute";
                showToast("音效功能已靜音", "info");
            }
        });


        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "glass-panel px-4 py-3 rounded-xl shadow-lg border text-xs md:text-sm flex items-center space-x-3 pointer-events-auto transform translate-y-2 opacity-0 transition-all duration-300";
            
            let iconClass = "fa-info-circle text-cyan-400";
            let borderColor = "rgba(0, 242, 254, 0.3)";

            if (type === 'success') {
                iconClass = "fa-check-circle text-emerald-400";
                borderColor = "rgba(52, 211, 153, 0.3)";
            } else if (type === 'warning') {
                iconClass = "fa-exclamation-triangle text-amber-400";
                borderColor = "rgba(251, 191, 36, 0.3)";
            }

            toast.style.borderColor = borderColor;
            toast.innerHTML = `
                <i class="fas ${iconClass} text-base flex-shrink-0"></i>
                <span class="text-slate-100">${message}</span>
            `;

            container.appendChild(toast);

            // 淡入
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);

            // 3秒後淡出刪除
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3500);
        }
    </script>
</body>
